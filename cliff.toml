# git-cliff configuration — Keep a Changelog format for Themis.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to Themis are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") -%}
  ### {{ group }}
  {% for commit in commits -%}
    - {{ commit.message | split(pat="\n") | first | trim }}\
      {% if commit.github.pr_number %} ([#{{ commit.github.pr_number }}](https://github.com/{{ commit.github.owner }}/{{ commit.github.repo }}/pull/{{ commit.github.pr_number }})){% endif %}\
      {% if commit.github.username %} (@{{ commit.github.username }}){% endif %}
  {% endfor %}
{% endfor %}
"""
trim = true
footer = """
<!-- generated by git-cliff / .github/workflows/changelog.yml -->
"""

[git]
conventional_commits = false
filter_commits = false
topo_order = false
sort_commits = "oldest"

commit_parsers = [
  { message = "^[Mm]erge pull request", skip = true },
  { message = "^[Mm]erge branch", skip = true },
  { message = "^[Mm]erge remote-tracking branch", skip = true },
  { message = "^feat(\\(.+\\))?!?:", group = "Added" },
  { message = "^feat:", group = "Added" },
  { message = "^[Aa]dd(\\(.+\\))?!?:", group = "Added" },
  { message = "^[Ii]nitial", group = "Added" },
  { message = "^fix(\\(.+\\))?!?:", group = "Fixed" },
  { message = "^fix:", group = "Fixed" },
  { message = "^security(\\(.+\\))?!?:", group = "Security" },
  { message = "^docs(\\(.+\\))?!?:", group = "Changed" },
  { message = "^refactor(\\(.+\\))?!?:", group = "Changed" },
  { message = "^[Rr]efactor", group = "Changed" },
  { message = "^[Uu]pdate", group = "Changed" },
  { message = "^chore(\\(.+\\))?!?:", group = "Changed" },
  { message = "^perf(\\(.+\\))?!?:", group = "Changed" },
  { message = "^build(\\(.+\\))?!?:", group = "Changed" },
  { message = "^ci(\\(.+\\))?!?:", group = "Changed" },
  { message = "^test(\\(.+\\))?!?:", group = "Changed" },
  { message = ".*", group = "Changed" },
]

[remote.github]
owner = "tofchaliss"
repo = "themis"
