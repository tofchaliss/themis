name: Changelog

on:
  push:
    tags:
      - "v*"
      - "themis-phase-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to anchor this release section (e.g. v0.1.0). Leave empty for [Unreleased] only."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git-cliff args
        id: args
        run: |
          set -euo pipefail
          args="--verbose"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            args="$args --tag ${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
            if [[ "$tag" != v* ]]; then
              tag="v${tag}"
            fi
            args="$args --tag ${tag}"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ${{ steps.args.outputs.args }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Detect changes
        id: diff
        run: |
          if [[ ! -f CHANGELOG.md ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif git ls-files --error-unmatch CHANGELOG.md &>/dev/null; then
            if git diff --quiet -- CHANGELOG.md; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # Tag pushes check out a detached HEAD, so the base branch must be explicit
          # (otherwise the action fails with "'base' input must be supplied").
          base: main
          commit-message: "chore: update CHANGELOG.md"
          title: "chore: update CHANGELOG.md"
          body: |
            Automated changelog update generated by [git-cliff](https://git-cliff.org/).

            **Trigger:** ${{ github.event_name }}
            ${{ github.event_name == 'push' && format('**Tag:** `{0}`', github.ref_name) || '' }}
            ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && format('**Tag:** `{0}`', inputs.tag) || '' }}

            Review the grouped entries, edit wording if needed, then merge.
          branch: changelog/update
          delete-branch: true
          labels: |
            changelog
            automation

      - name: No changes
        if: steps.diff.outputs.changed != 'true'
        run: echo "CHANGELOG.md is already up to date; skipping PR."
