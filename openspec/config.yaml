schema: spec-driven

# Project context shown to AI when creating OpenSpec artifacts.
context: |
  Themis — open-source Go backend security intelligence platform (PostgreSQL, Clean Architecture).

  Canonical context sources (read before any work):
  - docs/current-changes/PROJECT_CONTEXT.md — domain model, architecture, phase scope, invariants, quality gates
  - README.md — build/test/config, coverage targets, repo layout
  - docs/current-changes/AGENTS.md — agent workflow tying the above to OpenSpec
  - openspec/specs/ — canonical capability specs (Phase 1 + 2a merged; source of truth)
  - openspec/STATUS.md — authoritative active-change / release / phase status

  Active change: themis-ai-1 (v0.4.0 Basic AI Enrichment — advisory CVE Summarizer). Do not add features beyond the active change without explicit direction.

  Permanent invariants:
  - Raw component_vulnerabilities rows are never deleted or modified; VEX changes risk_context.effective_state only
  - Clean Architecture import direction enforced by go-cleanarch + depguard
  - Six gates per task group: build, unit tests, coverage, dead code, integration tests, clean-arch

rules:
  proposal:
    - Align with docs/current-changes/PROJECT_CONTEXT.md phase scope; include Non-goals for deferred phases
    - Reference existing ADRs in docs/archive/proposal-initial.md where applicable
  design:
    - Follow Clean Architecture layers; document import rules
    - State which quality gates apply
  tasks:
    - Break into task groups matching capabilities in proposal.md
    - Each group ends with the six mandatory gates from docs/current-changes/PROJECT_CONTEXT.md
    - Mark tasks complete only when make check passes
  specs:
    - One spec per capability; include acceptance scenarios
    - Never require Phase 2/3 features in Phase 1 specs
